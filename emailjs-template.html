<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>EmailJS Template</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">
  
  <div style="background: linear-gradient(135deg, #1e3a5f, #3498db); padding: 30px; text-align: center; border-radius: 10px 10px 0 0;">
    <h1 style="color: white; margin: 0; font-size: 28px;">🚗 Nueva Solicitud - Dumbodetailing</h1>
  </div>
  
  <div style="background: white; padding: 30px; border-left: 5px solid #2ecc71; border-radius: 0 0 10px 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
    
    <h2 style="color: #1e3a5f; border-bottom: 2px solid #2ecc71; padding-bottom: 10px;">📋 Detalles del Cliente</h2>
    
    <table style="width: 100%; margin-bottom: 20px; border-collapse: collapse;">
      <tr>
        <td style="padding: 12px; border-bottom: 1px solid #eee; font-weight: bold;">👤 Nombre:</td>
        <td style="padding: 12px; border-bottom: 1px solid #eee;">{{user_name}}</td>
      </tr>
      <tr>
        <td style="padding: 12px; border-bottom: 1px solid #eee; font-weight: bold;">📞 Teléfono:</td>
        <td style="padding: 12px; border-bottom: 1px solid #eee;">{{user_phone}}</td>
      </tr>
      <tr style="background: #f8f9fa;">
        <td style="padding: 12px; border-bottom: 1px solid #eee; font-weight: bold;">✉️ Email:</td>
        <td style="padding: 12px; border-bottom: 1px solid #eee;">{{user_email}}</td>
      </tr>
      <tr>
        <td style="padding: 12px; border-bottom: 1px solid #eee; font-weight: bold;">🚗 Servicio:</td>
        <td style="padding: 12px; border-bottom: 1px solid #eee; font-size: 16px; font-weight: bold; color: #2ecc71;">{{user_service}}</td>
      </tr>
    </table>
    
    <div style="background: #f8f9fa; padding: 20px; border-radius: 8px; border-left: 4px solid #3498db;">
      <h3 style="margin-top: 0; color: #1e3a5f;">💬 Mensaje:</h3>
      <p style="margin: 0; white-space: pre-wrap;">{{user_message}}</p>
    </div>
    
    <hr style="margin: 30px 0; border: none; border-top: 1px solid #eee;">
    
    <div style="text-align: center; font-size: 14px; color: #666;">
      <p><strong>Dumbodetailing</strong> | Lavado Profesional de Carros</p>
      <p>📱 (787) 557-3419 | 🌐 dumbodetailing463@gmail.com</p>
    </div>
    
  </div>
  
</body>
</html>
